<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeAPI Sprite Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>PokeAPI Sprite Finder</h1>
        <button id="themeToggle">Toggle Theme</button>
    </div>
    <div class="search-container">
        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="Enter name or ID..." autocomplete="off">
            <div id="autocomplete-list" class="autocomplete-items"></div>
        </div>
<div id="searchId" class="search-id"></div>
<div id="searchId" class="search-id"></div>
        <div class="search-options">
            <label><input type="radio" name="searchType" value="pokemon" checked> Pokémon</label>
            <label><input type="radio" name="searchType" value="item"> Item</label>
            <label><input type="radio" name="searchType" value="pokemon-form"> Pokémon Form</label>
            <label><input type="radio" name="searchType" value="type"> Type</label>
        </div>
        <button id="displayBtn">Display Sprites</button>
    </div>
    <div id="results" class="results-container"></div>
    <script type="module" src="script.js"></script>
</body>
</html>
